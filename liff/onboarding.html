<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歡迎使用「今天還在嗎」</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #E8F8EE, #F0F9F4);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 { font-size: 26px; color: #00B900; margin-bottom: 8px; text-align: center; }
  h2 { font-size: 18px; color: #555; margin-bottom: 12px; }
  .subtitle { color: #888; text-align: center; margin-bottom: 20px; font-size: 14px; }
  .step-indicator {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .step {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    background: #F5F5F5;
    color: #888;
    font-size: 12px;
    margin: 0 2px;
  }
  .step.active {
    background: #00B900;
    color: #fff;
    font-weight: 700;
  }
  .step.done {
    background: #4CAF50;
    color: #fff;
  }
  .step-num {
    display: block;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    text-align: center;
    text-decoration: none;
  }
  .btn-primary { background: #00B900; color: #fff; }
  .btn-secondary { background: #fff; color: #00B900; border: 2px solid #00B900; }
  .status-box {
    background: #F0F9F4;
    border: 2px solid #00B900;
    border-radius: 12px;
    padding: 16px;
    margin: 12px 0;
    text-align: center;
  }
  .status-box.warn {
    background: #FFF4E5;
    border-color: #E08E00;
  }
  .reminder-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 16px 0;
  }
  .reminder-btn {
    padding: 12px;
    border: 2px solid #E0E0E0;
    background: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    text-align: center;
  }
  .reminder-btn.selected {
    border-color: #00B900;
    background: #E8F8EE;
    color: #00B900;
    font-weight: 700;
  }
  .loading {
    text-align: center;
    padding: 40px;
    color: #888;
  }
  .icon-big {
    font-size: 56px;
    text-align: center;
    margin: 20px 0;
  }
</style>
</head>
<body>
<div class="container">
  <div id="loading" class="card loading">
    <div>載入中...</div>
  </div>
  
  <div id="content" style="display:none;">
    <div class="card">
      <h1>📍 今天還在嗎</h1>
      <div class="subtitle">守護長輩平安的 LINE 助手</div>
      
      <div class="step-indicator" id="steps">
        <div class="step" data-step="1"><span class="step-num">1</span>LINE 登入</div>
        <div class="step" data-step="2"><span class="step-num">2</span>守護人</div>
        <div class="step" data-step="3"><span class="step-num">3</span>提醒時間</div>
      </div>
      
      <div id="step-content"></div>
    </div>
  </div>
</div>

<script>
const LIFF_ID = "2010674803-sLl9j1Sk";
const API_BASE = "https://alive-checkin.onrender.com";

let state = {
  loggedIn: false,
  lineUserId: null,
  hasGuardian: false,
  reminderTime: null,
  currentStep: 1
};

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      // 自動觸發 LINE 登入
      liff.login();
      return;
    }
    
    state.loggedIn = true;
    state.lineUserId = liff.getProfile ? (await liff.getProfile()).userId : null;
    
    // 取得用戶狀態
    if (state.lineUserId) {
      const res = await fetch(`${API_BASE}/api/onboarding/state?line_user_id=${state.lineUserId}`);
      if (res.ok) {
        const data = await res.json();
        state.hasGuardian = data.has_guardian;
        state.reminderTime = data.reminder_time;
      }
    }
    
    // 判斷當前步驟
    if (!state.hasGuardian) state.currentStep = 2;
    else if (!state.reminderTime) state.currentStep = 3;
    else state.currentStep = 4; // 全部完成
    
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
    renderStep();
  } catch (err) {
    document.getElementById("loading").innerHTML = `
      <div style="color:#D6322C;">⚠️ LIFF 初始化失敗</div>
      <div style="font-size:13px;margin-top:12px;">${err.message || err}</div>
      <div style="font-size:12px;color:#888;margin-top:8px;">請確認 LIFF Endpoint URL 已設為 ${API_BASE}</div>
    `;
  }
}

function renderStep() {
  // 更新步驟指示器
  document.querySelectorAll(".step").forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.remove("active", "done");
    if (s < state.currentStep) el.classList.add("done");
    else if (s === state.currentStep) el.classList.add("active");
  });
  
  const content = document.getElementById("step-content");
  
  if (state.currentStep === 2) {
    // Step 2: 守護人綁定
    content.innerHTML = `
      <div class="icon-big">👨‍👩‍👧</div>
      <h2 style="text-align:center;">綁定你的守護人</h2>
      <p style="color:#888;margin-bottom:16px;">新增至少 1 位家人/朋友,逾期未簽到或 SOS 時會通知他們。</p>
      <a href="./guardian.html" class="btn btn-primary">開始綁定守護人</a>
      <button class="btn btn-secondary" onclick="skipStep('guardian')">稍後再設定</button>
    `;
  } else if (state.currentStep === 3) {
    // Step 3: 提醒時間
    content.innerHTML = `
      <div class="icon-big">⏰</div>
      <h2 style="text-align:center;">設定每日提醒時間</h2>
      <p style="color:#888;margin-bottom:16px;">選一個方便的時間,系統會在這時間提醒您簽到。</p>
      <div class="reminder-options">
        <div class="reminder-btn" onclick="selectReminder(this, '08:00')">上午 8:00</div>
        <div class="reminder-btn selected" onclick="selectReminder(this, '09:00')">上午 9:00</div>
        <div class="reminder-btn" onclick="selectReminder(this, '12:00')">中午 12:00</div>
        <div class="reminder-btn" onclick="selectReminder(this, '18:00')">下午 6:00</div>
        <div class="reminder-btn" onclick="selectReminder(this, '20:00')">晚上 8:00</div>
        <div class="reminder-btn" onclick="selectReminder(this, '21:00')">晚上 9:00</div>
      </div>
      <button class="btn btn-primary" id="saveReminderBtn" onclick="saveReminder()">✓ 完成設定</button>
    `;
  } else if (state.currentStep === 4) {
    // 全部完成
    content.innerHTML = `
      <div class="icon-big">🎉</div>
      <h2 style="text-align:center;">設定完成!</h2>
      <div class="status-box">
        <div>✅ LINE 登入</div>
        <div>✅ 守護人已綁定</div>
        <div>✅ 提醒時間:${state.reminderTime}</div>
      </div>
      <a href="./checkin.html" class="btn btn-primary">開始每日報平安</a>
      <a href="./member.html" class="btn btn-secondary">我的會員中心</a>
    `;
  }
}

function selectReminder(el, time) {
  document.querySelectorAll(".reminder-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  state.selectedTime = time;
}

async function saveReminder() {
  const time = state.selectedTime || state.reminderTime || "09:00";
  const btn = document.getElementById("saveReminderBtn");
  btn.disabled = true;
  btn.textContent = "儲存中...";
  
  try {
    const res = await fetch(`${API_BASE}/api/onboarding/reminder`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        line_user_id: state.lineUserId,
        reminder_time: time
      })
    });
    if (res.ok) {
      state.reminderTime = time;
      state.currentStep = 4;
      renderStep();
    } else {
      alert("儲存失敗,請稍後再試");
      btn.disabled = false;
      btn.textContent = "✓ 完成設定";
    }
  } catch (err) {
    alert("網路錯誤:" + err.message);
    btn.disabled = false;
    btn.textContent = "✓ 完成設定";
  }
}

function skipStep(step) {
  if (step === "guardian") {
    state.currentStep = 3;
    renderStep();
  }
}

init();
</script>
</body>
</html>
