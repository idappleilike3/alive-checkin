<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="alive-deploy" content="W250724av">
  <title>邀請</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      min-height: 100dvh;
      background: #f0fdf4;
      overscroll-behavior: none;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }
    #tapLayer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 2;
    }
    #tapLayer:disabled { pointer-events: none; }
    #actions {
      position: fixed;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 3;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: min(92vw, 360px);
    }
    #actions.is-visible { display: flex; }
    #actions button {
      border: 0;
      border-radius: 999px;
      padding: 14px 28px;
      width: 100%;
      font-size: 18px;
      font-weight: 800;
      -webkit-tap-highlight-color: rgba(0,0,0,0.08);
      touch-action: manipulation;
      cursor: pointer;
    }
    #retry {
      background: #15803d;
      color: #fff;
    }
    #doneHome {
      background: #0f766e;
      color: #fff;
    }
    #hint {
      display: none;
      position: fixed;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      z-index: 1;
      width: min(88vw, 340px);
      text-align: center;
      color: #14532d;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.6;
      pointer-events: none;
    }
    #hint.is-visible { display: block; }
  </style>
</head>
<body>
  <button id="tapLayer" type="button" aria-label="再試一次" disabled></button>
  <p id="hint">分享完成後，請按下方按鈕回到原本頁面。</p>
  <div id="actions">
    <button id="retry" type="button">再分享一次</button>
    <button id="doneHome" type="button">完成，返回原位置</button>
  </div>

  <script>
    // W250724av：分享成功／按完成鈕 → 跳回原位置（return / open / #home|#member）
    const LIFF_ID = "2010674803-rK98c0lo";
    const AUTO_SHARE_KEY = "alive_share_invite_auto_v1";
    const DONE_KEY = "alive_share_invite_done_v1";
    const RETURN_KEY = "alive_share_invite_return_v1";
    const tapLayer = document.getElementById("tapLayer");
    const retryBtn = document.getElementById("retry");
    const doneHomeBtn = document.getElementById("doneHome");
    const actions = document.getElementById("actions");
    const hint = document.getElementById("hint");

    let inviteText = "";
    let myUserId = "";
    let ready = false;
    let sharing = false;
    let shareBlocked = false;

    function sanitizeUserId(raw) {
      return String(raw || "").trim().replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function buildInviteText(userId) {
      const safeId = sanitizeUserId(userId);
      const bindUrl = safeId
        ? ("https://line.me/R/app/" + LIFF_ID + "?invite_from=" + encodeURIComponent(safeId))
        : ("https://line.me/R/app/" + LIFF_ID + "?open=onboarding");
      return (
        "我想邀請你成為「每日平安」的守護人\n" +
        "有緊急或我沒報平安時，系統會通知你\n" +
        "請先加入 LINE 官方帳號「每日平安」，再點下面連結完成綁定\n" +
        bindUrl
      );
    }

    function buildNativeShareUrl(text) {
      return "https://line.me/R/share?text=" + encodeURIComponent(String(text || ""));
    }

    function buildSafeRedirectUri() {
      const params = new URLSearchParams(window.location.search || "");
      ["code", "state", "liffClientId", "liffRedirectUri", "liff.state"].forEach(function (key) {
        params.delete(key);
      });
      const query = params.toString();
      return window.location.origin + window.location.pathname + (query ? ("?" + query) : "");
    }

    function rememberReturnTarget(raw) {
      const safe = sanitizeReturnPath(raw);
      if (!safe) return;
      try { sessionStorage.setItem(RETURN_KEY, safe); } catch (_) {}
    }

    function sanitizeReturnPath(raw) {
      let text = String(raw || "").trim();
      if (!text) return "";
      try { text = decodeURIComponent(text); } catch (_) {}
      text = text.trim();
      if (!text) return "";
      // Absolute same-origin URL → path+hash
      if (/^https?:\/\//i.test(text)) {
        try {
          const u = new URL(text);
          if (u.origin !== window.location.origin) return "";
          return (u.pathname || "/") + (u.search || "") + (u.hash || "");
        } catch (_) {
          return "";
        }
      }
      // Only relative in-app paths
      if (text.startsWith("//") || text.includes("://")) return "";
      if (text.charAt(0) === "#") return "/" + text;
      if (text.charAt(0) !== "/") text = "/" + text;
      return text;
    }

    function resolveReturnUrl() {
      const params = new URLSearchParams(window.location.search || "");
      const fromQuery = sanitizeReturnPath(params.get("return") || params.get("back") || "");
      if (fromQuery) {
        rememberReturnTarget(fromQuery);
        return window.location.origin + fromQuery;
      }
      const open = String(params.get("open") || "").trim().toLowerCase();
      if (open === "member" || open === "guardians") {
        rememberReturnTarget("/#member");
        return window.location.origin + "/#member";
      }
      if (open === "home" || open === "guard" || open === "checkin") {
        rememberReturnTarget("/#home");
        return window.location.origin + "/#home";
      }
      try {
        const stored = sanitizeReturnPath(sessionStorage.getItem(RETURN_KEY) || "");
        if (stored) return window.location.origin + stored;
      } catch (_) {}
      return window.location.origin + "/#home";
    }

    function homeUrl() {
      return window.location.origin + "/#home";
    }

    function markAutoShareTried() {
      try { sessionStorage.setItem(AUTO_SHARE_KEY, "1"); } catch (_) {}
    }

    function hasAutoShareTried() {
      try { return sessionStorage.getItem(AUTO_SHARE_KEY) === "1"; } catch (_) { return false; }
    }

    function markShareDone() {
      try { sessionStorage.setItem(DONE_KEY, "1"); } catch (_) {}
    }

    function goNextStep() {
      markShareDone();
      const target = resolveReturnUrl();
      try {
        if (window.liff && typeof liff.isInClient === "function" && liff.isInClient()) {
          try {
            if (typeof liff.openWindow === "function") {
              liff.openWindow({ url: target, external: false });
            }
          } catch (_) {}
          setTimeout(function () {
            try {
              if (typeof liff.closeWindow === "function") liff.closeWindow();
            } catch (_) {}
            window.location.replace(target);
          }, 250);
          return;
        }
      } catch (_) {}
      window.location.replace(target);
    }

    function showPostShareUi() {
      actions.classList.add("is-visible");
      hint.classList.add("is-visible");
      tapLayer.disabled = false;
      ready = true;
    }

    function hidePostShareUi() {
      actions.classList.remove("is-visible");
      hint.classList.remove("is-visible");
    }

    function alertFail(msg) {
      try { alert(String(msg || "暫時無法分享")); } catch (_) {}
    }

    function openNativeShare() {
      if (!inviteText) inviteText = buildInviteText(myUserId);
      const shareUrl = buildNativeShareUrl(inviteText);
      try {
        if (
          window.liff &&
          typeof liff.openWindow === "function" &&
          typeof liff.isInClient === "function" &&
          liff.isInClient()
        ) {
          liff.openWindow({ url: shareUrl, external: false });
          return true;
        }
        window.location.assign(shareUrl);
        return true;
      } catch (error) {
        alertFail((error && error.message) ? error.message : error);
        return false;
      }
    }

    async function tryShareTargetPicker() {
      if (!window.liff || typeof liff.shareTargetPicker !== "function") return false;
      try {
        if (typeof liff.isInClient === "function" && !liff.isInClient()) return false;
        if (typeof liff.isApiAvailable === "function" && !liff.isApiAvailable("shareTargetPicker")) return false;
        const result = await liff.shareTargetPicker([{ type: "text", text: inviteText }]);
        if (result) {
          goNextStep();
          return true;
        }
        // 使用者取消：仍顯示完成／返回，不要卡在邀請頁
        showPostShareUi();
        return false;
      } catch (error) {
        alertFail((error && error.message) ? error.message : error);
        return false;
      }
    }

    async function openShare() {
      if (sharing || shareBlocked || !ready) return;
      if (!inviteText) inviteText = buildInviteText(myUserId);
      sharing = true;
      tapLayer.disabled = true;
      hidePostShareUi();
      try {
        if (openNativeShare()) {
          // openWindow 不會離開本頁：立刻給「完成／返回原位置」
          markAutoShareTried();
          showPostShareUi();
          return;
        }
        const ok = await tryShareTargetPicker();
        if (!ok) showPostShareUi();
      } finally {
        sharing = false;
        if (!shareBlocked) tapLayer.disabled = false;
      }
    }

    function onRetry(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      openShare();
    }

    async function initializeLiff() {
      inviteText = buildInviteText("");
      resolveReturnUrl();
      try {
        if (!window.liff) throw new Error("LIFF SDK 未載入");
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          try {
            liff.login({ redirectUri: buildSafeRedirectUri() });
          } catch (_) {
            try { liff.login(); } catch (e2) {
              alertFail(e2 && e2.message ? e2.message : e2);
              showPostShareUi();
            }
          }
          return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const inviteFrom = urlParams.get("invite_from");
        try {
          const profile = await liff.getProfile();
          myUserId = (profile && profile.userId) || "";
        } catch (_) {
          myUserId = "";
        }
        inviteText = buildInviteText(myUserId);

        if (inviteFrom && myUserId && inviteFrom !== myUserId) {
          shareBlocked = true;
          alertFail("這是別人的邀請連結，請回官方帳號完成綁定");
          tapLayer.disabled = true;
          showPostShareUi();
          return;
        }

        ready = true;

        // 已分享過／從 R/share 返回：直接給下一步，不要再自動開分享迴圈
        if (hasAutoShareTried()) {
          showPostShareUi();
          return;
        }

        markAutoShareTried();
        openNativeShare();
        showPostShareUi();
      } catch (error) {
        alertFail((error && error.message) ? error.message : error);
        showPostShareUi();
      }
    }

    window.addEventListener("pageshow", function (event) {
      if (event && event.persisted && !shareBlocked) {
        markAutoShareTried();
        showPostShareUi();
      }
    });

    tapLayer.addEventListener("click", onRetry);
    retryBtn.addEventListener("click", onRetry);
    doneHomeBtn.addEventListener("click", function (event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      goNextStep();
    });
    initializeLiff();
  </script>
</body>
</html>
