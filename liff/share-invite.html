<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="alive-deploy" content="W250723ak">
  <title>邀請</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      min-height: 100dvh;
      background: #f0fdf4;
      overscroll-behavior: none;
    }
    /* 全螢幕隱形可點層：無教學文案 */
    #tapLayer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 2;
    }
    #tapLayer:disabled { pointer-events: none; }
    #retry {
      display: none;
      position: fixed;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 3;
      border: 0;
      border-radius: 999px;
      padding: 14px 28px;
      background: #15803d;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      -webkit-tap-highlight-color: rgba(0,0,0,0.08);
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <button id="tapLayer" type="button" aria-label="再試一次" disabled></button>
  <button id="retry" type="button">再試一次</button>

  <script>
    // W250723ak：不要中間教學頁（禁止大按鈕／準備好了等文案）
    // 流程：init → login → 立刻 line.me/R/share；失敗才顯示「再試一次」
    // 受邀者連結：line.me/R/app?invite_from=（避開 liff.line.me/? → 400）
    const LIFF_ID = "2010674803-rK98c0lo";
    const tapLayer = document.getElementById("tapLayer");
    const retryBtn = document.getElementById("retry");

    let inviteText = "";
    let myUserId = "";
    let ready = false;
    let sharing = false;
    let shareBlocked = false;

    function sanitizeUserId(raw) {
      return String(raw || "").trim().replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function buildInviteText(userId) {
      const safeId = sanitizeUserId(userId);
      const bindUrl = safeId
        ? ("https://line.me/R/app/" + LIFF_ID + "?invite_from=" + encodeURIComponent(safeId))
        : ("https://line.me/R/app/" + LIFF_ID + "?open=onboarding");
      return (
        "我想邀請你成為「每日平安」的守護人。\n" +
        "請用 LINE 點開下面連結\n\n" +
        bindUrl
      );
    }

    function buildNativeShareUrl(text) {
      return "https://line.me/R/share?text=" + encodeURIComponent(String(text || ""));
    }

    function buildSafeRedirectUri() {
      const params = new URLSearchParams(window.location.search || "");
      ["code", "state", "liffClientId", "liffRedirectUri", "liff.state"].forEach(function (key) {
        params.delete(key);
      });
      const query = params.toString();
      return window.location.origin + window.location.pathname + (query ? ("?" + query) : "");
    }

    function showRetry() {
      retryBtn.style.display = "block";
      tapLayer.disabled = false;
      ready = true;
    }

    function hideRetry() {
      retryBtn.style.display = "none";
    }

    function alertFail(msg) {
      try { alert(String(msg || "暫時無法分享")); } catch (_) {}
    }

    function openNativeShare() {
      if (!inviteText) inviteText = buildInviteText(myUserId);
      try {
        window.location.href = buildNativeShareUrl(inviteText);
        return true;
      } catch (error) {
        alertFail((error && error.message) ? error.message : error);
        return false;
      }
    }

    async function tryShareTargetPicker() {
      if (!window.liff || typeof liff.shareTargetPicker !== "function") return false;
      try {
        if (typeof liff.isInClient === "function" && !liff.isInClient()) return false;
        if (typeof liff.isApiAvailable === "function" && !liff.isApiAvailable("shareTargetPicker")) return false;
        const result = await liff.shareTargetPicker([{ type: "text", text: inviteText }]);
        if (result) {
          try { if (typeof liff.closeWindow === "function") liff.closeWindow(); } catch (_) {}
          return true;
        }
        return false;
      } catch (error) {
        alertFail((error && error.message) ? error.message : error);
        return false;
      }
    }

    async function openShare() {
      if (sharing || shareBlocked || !ready) return;
      if (!inviteText) inviteText = buildInviteText(myUserId);
      sharing = true;
      tapLayer.disabled = true;
      hideRetry();
      try {
        // 優先原生分享（不依賴 shareTargetPicker 手勢）
        if (openNativeShare()) return;
        // 備援：同一次 click 內呼叫 picker
        const ok = await tryShareTargetPicker();
        if (!ok) showRetry();
      } finally {
        sharing = false;
        if (!shareBlocked) tapLayer.disabled = false;
      }
    }

    function onRetry(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      openShare();
    }

    async function initializeLiff() {
      inviteText = buildInviteText("");
      try {
        if (!window.liff) throw new Error("LIFF SDK 未載入");
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          try {
            liff.login({ redirectUri: buildSafeRedirectUri() });
          } catch (_) {
            try { liff.login(); } catch (e2) {
              alertFail(e2 && e2.message ? e2.message : e2);
              showRetry();
            }
          }
          return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const inviteFrom = urlParams.get("invite_from");
        try {
          const profile = await liff.getProfile();
          myUserId = (profile && profile.userId) || "";
        } catch (_) {
          myUserId = "";
        }
        inviteText = buildInviteText(myUserId);

        if (inviteFrom && myUserId && inviteFrom !== myUserId) {
          shareBlocked = true;
          alertFail("這是別人的邀請連結，請回官方帳號完成綁定");
          tapLayer.disabled = true;
          return;
        }

        ready = true;
        // 立刻導向原生好友選擇（無教學文案頁）
        openNativeShare();
        // 若仍停在本頁（被擋／外開失敗），短暫後顯示「再試一次」
        setTimeout(function () {
          if (!shareBlocked && document.visibilityState === "visible") showRetry();
        }, 1600);
      } catch (error) {
        alertFail((error && error.message) ? error.message : error);
        showRetry();
      }
    }

    tapLayer.addEventListener("click", onRetry);
    retryBtn.addEventListener("click", onRetry);
    initializeLiff();
  </script>
</body>
</html>
