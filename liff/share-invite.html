<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>一鍵邀請守護人</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      min-height: 100dvh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: #123c2c;
      background: linear-gradient(180deg, #e8f8ee, #ffffff);
      display: grid;
      place-items: center;
      padding: 24px 18px max(28px, env(safe-area-inset-bottom));
      /* 確保任何層都擋不住點擊 */
      pointer-events: auto;
    }
    .card {
      width: min(100%, 440px);
      padding: 28px 22px;
      border-radius: 22px;
      background: #fff;
      border: 2px solid #86efac;
      box-shadow: 0 16px 36px rgba(16, 85, 55, 0.16);
      text-align: center;
      position: relative;
      z-index: 2;
      pointer-events: auto;
    }
    h1 {
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 950;
      color: #067647;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    p {
      font-size: clamp(17px, 4.6vw, 20px);
      font-weight: 800;
      line-height: 1.55;
      color: #14532d;
    }
    .status {
      margin: 14px 0 18px;
      min-height: 28px;
      font-size: 16px;
      font-weight: 800;
      color: #166534;
    }
    .btn {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 68px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
      color: #fff;
      font-size: clamp(20px, 5.2vw, 24px);
      font-weight: 950;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(0,0,0,0.08);
      touch-action: manipulation;
      pointer-events: auto;
      position: relative;
      z-index: 5;
      box-shadow: 0 12px 24px rgba(22, 163, 74, 0.28);
    }
    .btn:disabled { opacity: 0.7; }
    .btn.secondary {
      margin-top: 12px;
      background: #ecfdf5;
      color: #065f46;
      border: 2px solid #34d399;
      box-shadow: none;
      min-height: 56px;
      font-size: 18px;
    }
    .fallback { margin-top: 16px; text-align: left; }
    .fallback[hidden] { display: none !important; }
    textarea {
      width: 100%;
      min-height: 120px;
      margin-top: 10px;
      padding: 12px;
      border: 1.5px solid #86efac;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-all;
      resize: none;
      pointer-events: auto;
    }
    .home-link {
      display: inline-block;
      margin-top: 18px;
      color: #067647;
      font-size: 16px;
      font-weight: 850;
      text-decoration: none;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>一鍵邀請守護人</h1>
    <p id="lead">請點下方大按鈕，直接分享給 LINE 好友</p>
    <div class="status" id="status">正在準備…</div>
    <button class="btn" id="shareBtn" type="button">立即分享給好友</button>
    <div class="fallback" id="fallback">
      <p>若分享視窗沒跳出，請複製下方邀請訊息，貼到 LINE 給家人：</p>
      <textarea id="inviteBox" readonly></textarea>
      <button class="btn secondary" id="copyBtn" type="button">複製邀請訊息</button>
    </div>
    <a class="home-link" id="homeLink" href="https://liff.line.me/2010674803-rK98c0lo/?open=home">回到首頁繼續設定</a>
  </main>

  <script>
    // 使用者指定標準：固定 LIFF ID；login() 絕不可帶 redirectUri
    const LIFF_ID = "2010674803-rK98c0lo";

    const statusEl = document.getElementById("status");
    const shareBtn = document.getElementById("shareBtn");
    const fallbackEl = document.getElementById("fallback");
    const inviteBox = document.getElementById("inviteBox");
    const copyBtn = document.getElementById("copyBtn");
    const leadEl = document.getElementById("lead");

    let inviteText = "";
    let myUserId = "";

    function sanitizeUserId(raw) {
      return String(raw || "").trim().replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function buildInviteText(userId) {
      const safeId = sanitizeUserId(userId);
      const bindUrl = safeId
        ? `https://liff.line.me/${LIFF_ID}/?invite_from=${encodeURIComponent(safeId)}`
        : `https://liff.line.me/${LIFF_ID}/?open=onboarding`;
      return (
        `我想邀請你成為「每日平安」的守護人。\n` +
        `請用 LINE 點開下面連結\n\n` +
        `${bindUrl}`
      );
    }

    function showFallback(message) {
      if (message) statusEl.textContent = message;
      inviteBox.value = inviteText;
      fallbackEl.hidden = false;
      shareBtn.disabled = false;
    }

    function canShare() {
      try {
        if (!window.liff || typeof liff.shareTargetPicker !== "function") return false;
        if (typeof liff.isInClient === "function" && !liff.isInClient()) return false;
        if (typeof liff.isApiAvailable === "function") {
          return Boolean(liff.isApiAvailable("shareTargetPicker"));
        }
        return true;
      } catch (_) {
        return false;
      }
    }

    async function shareNow() {
      shareBtn.disabled = true;
      statusEl.textContent = "正在開啟 LINE 分享…";
      try {
        if (!inviteText) inviteText = buildInviteText(myUserId);
        inviteBox.value = inviteText;
        if (!canShare()) {
          showFallback("目前無法直接開分享視窗，請改用下方複製");
          return false;
        }
        const result = await liff.shareTargetPicker([{ type: "text", text: inviteText }]);
        if (result) {
          statusEl.textContent = "已開啟 LINE 分享給好友";
          return true;
        }
        showFallback("已取消分享。可再按上方按鈕，或複製邀請訊息。");
        return false;
      } catch (error) {
        console.warn("shareTargetPicker failed", error);
        showFallback("分享未成功，請再點「立即分享給好友」或複製訊息");
        return false;
      } finally {
        shareBtn.disabled = false;
      }
    }

    async function initializeLiff() {
      try {
        // 1. 初始化 LIFF（固定 ID）
        await liff.init({ liffId: LIFF_ID });

        // 2. 未登入：絕對不要自己帶 redirectUri，讓 LINE 完美跳回原頁（含參數）
        if (!liff.isLoggedIn()) {
          statusEl.textContent = "前往 LINE 登入…";
          liff.login();
          return;
        }

        // 3. 已登入：讀網址參數
        const urlParams = new URLSearchParams(window.location.search);
        const inviteFrom = urlParams.get("invite_from");

        const profile = await liff.getProfile();
        myUserId = (profile && profile.userId) || "";

        if (inviteFrom && inviteFrom !== myUserId) {
          // 受邀者：這頁若被誤開，導回首頁帶 invite_from 完成綁定
          console.log("成功抓到邀請人 ID:", inviteFrom);
          leadEl.textContent = "偵測到邀請連結，正在前往綁定…";
          statusEl.textContent = "請稍候";
          location.replace(`https://liff.line.me/${LIFF_ID}/?invite_from=${encodeURIComponent(inviteFrom)}`);
          return;
        }

        console.log("這是邀請人分享頁（一般登入／一鍵分享）");
        inviteText = buildInviteText(myUserId);
        inviteBox.value = inviteText;
        fallbackEl.hidden = false;

        // 先嘗試自動開分享；失敗也不擋大按鈕（iOS/Android 皆可點）
        const shared = await shareNow();
        if (!shared) {
          statusEl.textContent = "請點下方大按鈕，直接分享給 LINE 好友";
        }
      } catch (error) {
        console.error("LIFF 初始化發生錯誤:", error);
        inviteText = buildInviteText("");
        showFallback("載入失敗，請改用下方複製邀請訊息");
      }
    }

    shareBtn.addEventListener("click", (event) => {
      event.preventDefault();
      shareNow();
    });
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(inviteText || inviteBox.value);
        statusEl.textContent = "已複製邀請訊息，請貼到 LINE 給家人";
      } catch (_) {
        inviteBox.focus();
        inviteBox.select();
        statusEl.textContent = "請手動複製上方文字";
      }
    });

    initializeLiff();
  </script>
</body>
</html>
