<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>一鍵邀請守護人</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: #123c2c;
      background:
        linear-gradient(180deg, rgba(232, 248, 238, 0.92), rgba(255, 255, 255, 0.94)),
        url("../assets/share-hero-family.png") center 30% / cover no-repeat;
      display: grid;
      place-items: center;
      padding: 24px 18px max(24px, env(safe-area-inset-bottom));
    }
    .card {
      width: min(100%, 440px);
      padding: 28px 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      border: 2px solid #86efac;
      box-shadow: 0 16px 36px rgba(16, 85, 55, 0.16);
      text-align: center;
    }
    h1 {
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 950;
      color: #067647;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    p {
      font-size: clamp(17px, 4.6vw, 20px);
      font-weight: 800;
      line-height: 1.55;
      color: #14532d;
    }
    .status {
      margin: 14px 0 18px;
      min-height: 28px;
      font-size: 16px;
      font-weight: 800;
      color: #166534;
    }
    .btn {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
      color: #fff;
      font-size: clamp(20px, 5.2vw, 24px);
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(22, 163, 74, 0.28);
    }
    .btn:disabled { opacity: 0.65; cursor: wait; }
    .btn.secondary {
      margin-top: 12px;
      background: #ecfdf5;
      color: #065f46;
      border: 2px solid #34d399;
      box-shadow: none;
      min-height: 52px;
      font-size: 18px;
    }
    .fallback {
      margin-top: 16px;
      text-align: left;
    }
    .fallback[hidden] { display: none !important; }
    textarea {
      width: 100%;
      min-height: 110px;
      margin-top: 10px;
      padding: 12px;
      border: 1.5px solid #86efac;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-all;
      resize: none;
    }
    .home-link {
      display: inline-block;
      margin-top: 18px;
      color: #067647;
      font-size: 16px;
      font-weight: 850;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>一鍵邀請守護人</h1>
    <p>正在開啟 LINE 分享給好友…</p>
    <div class="status" id="status">請稍候</div>
    <button class="btn" id="shareBtn" type="button">立即分享給好友</button>
    <div class="fallback" id="fallback" hidden>
      <p>若分享視窗沒跳出，請複製下方邀請訊息，貼到 LINE 給家人：</p>
      <textarea id="inviteBox" readonly></textarea>
      <button class="btn secondary" id="copyBtn" type="button">複製邀請訊息</button>
    </div>
    <a class="home-link" id="homeLink" href="https://liff.line.me/2010674803-rK98c0lo/?open=home">回到首頁繼續設定</a>
  </main>

  <script>
    const FALLBACK_LIFF_ID = "2010674803-rK98c0lo";
    const API_BASE = (location.origin && location.origin.startsWith("http"))
      ? location.origin
      : "https://alive-checkin.onrender.com";

    const statusEl = document.getElementById("status");
    const shareBtn = document.getElementById("shareBtn");
    const fallbackEl = document.getElementById("fallback");
    const inviteBox = document.getElementById("inviteBox");
    const copyBtn = document.getElementById("copyBtn");

    let liffId = FALLBACK_LIFF_ID;
    let inviteText = "";

    async function resolveLiffId() {
      try {
        const res = await fetch(`${API_BASE}/api/config`);
        if (res.ok) {
          const cfg = await res.json();
          if (cfg.liff_id) return String(cfg.liff_id);
        }
      } catch (_) {}
      return FALLBACK_LIFF_ID;
    }

    function sanitizeUserId(raw) {
      return String(raw || "").trim().replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function buildInviteText(userId) {
      const safeId = sanitizeUserId(userId);
      const bindUrl = safeId
        ? `https://liff.line.me/${liffId}/?invite_from=${encodeURIComponent(safeId)}`
        : `https://liff.line.me/${liffId}/?open=onboarding`;
      return (
        `我想邀請你成為「每日平安」的守護人。\n` +
        `請用 LINE 點開下面連結\n\n` +
        `${bindUrl}`
      );
    }

    function showFallback(message) {
      if (message) statusEl.textContent = message;
      inviteBox.value = inviteText;
      fallbackEl.hidden = false;
    }

    async function canShare() {
      try {
        if (!window.liff || typeof liff.shareTargetPicker !== "function") return false;
        if (typeof liff.isApiAvailable === "function") {
          return Boolean(liff.isApiAvailable("shareTargetPicker"));
        }
        return true;
      } catch (_) {
        return false;
      }
    }

    async function shareNow({ fromAuto } = { fromAuto: false }) {
      shareBtn.disabled = true;
      statusEl.textContent = fromAuto ? "正在開啟 LINE 分享…" : "開啟分享視窗中…";
      try {
        if (!(await canShare())) {
          showFallback("此環境無法直接呼叫分享，請改用下方複製");
          return false;
        }
        const result = await liff.shareTargetPicker([{ type: "text", text: inviteText }]);
        if (result) {
          statusEl.textContent = "已開啟 LINE 分享給好友";
          // 分享完成後引導回首頁繼續設定
          setTimeout(() => {
            location.href = `https://liff.line.me/${liffId}/?open=home`;
          }, 700);
          return true;
        }
        showFallback("已取消分享。要再試一次可按上方按鈕，或複製邀請訊息。");
        return false;
      } catch (error) {
        console.warn("shareTargetPicker failed", error);
        showFallback("自動分享未成功，請點「立即分享給好友」或複製訊息");
        return false;
      } finally {
        shareBtn.disabled = false;
      }
    }

    async function init() {
      try {
        liffId = await resolveLiffId();
        document.getElementById("homeLink").href = `https://liff.line.me/${liffId}/?open=home`;
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        let userId = "";
        try {
          const profile = await liff.getProfile();
          userId = profile && profile.userId ? profile.userId : "";
        } catch (_) {}
        inviteText = buildInviteText(userId);
        inviteBox.value = inviteText;

        // Flex 按鈕點進來後盡量直接開分享；失敗則顯示大按鈕備援
        const shared = await shareNow({ fromAuto: true });
        if (!shared) {
          statusEl.textContent = "請點下方按鈕，直接分享給 LINE 好友";
        }
      } catch (error) {
        console.error(error);
        statusEl.textContent = "載入失敗，請改用下方複製邀請訊息";
        inviteText = buildInviteText("");
        showFallback();
      }
    }

    shareBtn.addEventListener("click", () => shareNow({ fromAuto: false }));
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(inviteText);
        statusEl.textContent = "已複製邀請訊息，請貼到 LINE 給家人";
      } catch (_) {
        inviteBox.focus();
        inviteBox.select();
        statusEl.textContent = "請手動複製上方文字";
      }
    });

    init();
  </script>
</body>
</html>
