<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="alive-deploy" content="W250723x">
  <title>分享給好友</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      min-height: 100dvh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: #123c2c;
      background: linear-gradient(180deg, #dcfce7 0%, #f0fdf4 45%, #ffffff 100%);
      display: grid;
      place-items: stretch;
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }
    .screen {
      width: min(100%, 480px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      min-height: calc(100dvh - 36px);
    }
    h1 {
      font-size: clamp(28px, 8vw, 36px);
      font-weight: 950;
      color: #067647;
      line-height: 1.25;
      text-align: center;
    }
    .hint {
      text-align: center;
      font-size: clamp(17px, 4.8vw, 20px);
      font-weight: 800;
      line-height: 1.5;
      color: #166534;
    }
    .status {
      min-height: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      color: #15803d;
    }
    .share-btn {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: min(46vh, 280px);
      border: 0;
      border-radius: 28px;
      background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
      color: #fff;
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 950;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(0,0,0,0.08);
      touch-action: manipulation;
      box-shadow: 0 18px 40px rgba(21, 128, 61, 0.35);
    }
    .share-btn:disabled { opacity: 0.65; }
    .share-btn .sub {
      display: block;
      margin-top: 10px;
      font-size: clamp(16px, 4.2vw, 18px);
      font-weight: 800;
      opacity: 0.92;
    }
    .err {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fef2f2;
      color: #991b1b;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="screen">
    <h1>分享給好友</h1>
    <p class="hint" id="lead">點一下大按鈕，直接選 LINE 好友介紹</p>
    <div class="status" id="status">正在準備…</div>
    <button class="share-btn" id="shareBtn" type="button" disabled>
      分享給好友
      <span class="sub">開啟 LINE 好友選擇</span>
    </button>
    <div class="err" id="errBox"></div>
  </main>

  <script>
    // W250723x：整頁只做分享給好友（不經首頁；僅 shareTargetPicker）
    // shareTargetPicker 只在使用者 click 時呼叫
    const LIFF_ID = "2010674803-rK98c0lo";

    const statusEl = document.getElementById("status");
    const shareBtn = document.getElementById("shareBtn");
    const leadEl = document.getElementById("lead");
    const errBox = document.getElementById("errBox");

    let inviteText = "";
    let myUserId = "";
    let ready = false;
    let sharing = false;
    let shareBlocked = false;

    function showError(error) {
      const msg = (error && error.message) ? String(error.message) : String(error || "未知錯誤");
      errBox.style.display = "block";
      errBox.textContent = "暫時無法分享：" + msg;
      try {
        alert("暫時無法分享：" + msg);
      } catch (_) {}
    }

    function sanitizeUserId(raw) {
      return String(raw || "").trim().replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function buildInviteText(userId) {
      const safeId = sanitizeUserId(userId);
      const bindUrl = safeId
        ? ("https://liff.line.me/" + LIFF_ID + "/?invite_from=" + encodeURIComponent(safeId))
        : ("https://liff.line.me/" + LIFF_ID + "/?open=onboarding");
      return (
        "我想邀請你成為「每日平安」的守護人。\n" +
        "請用 LINE 點開下面連結\n\n" +
        bindUrl
      );
    }

    function buildSafeRedirectUri() {
      const params = new URLSearchParams(window.location.search || "");
      ["code", "state", "liffClientId", "liffRedirectUri", "liff.state"].forEach(function (key) {
        params.delete(key);
      });
      const query = params.toString();
      return window.location.origin + window.location.pathname + (query ? ("?" + query) : "");
    }

    function setReadyUi(message) {
      inviteText = buildInviteText(myUserId);
      statusEl.textContent = message || "準備好了，請點大按鈕";
      shareBtn.disabled = false;
      ready = true;
    }

    async function onShareClick(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      if (sharing) return;
      if (shareBlocked) {
        statusEl.textContent = "這是邀請連結，請回官方帳號首頁完成綁定";
        return;
      }
      if (!ready) {
        statusEl.textContent = "還沒準備好，請稍候再點";
        return;
      }
      sharing = true;
      shareBtn.disabled = true;
      statusEl.textContent = "正在開啟 LINE 好友選擇…";
      errBox.style.display = "none";
      try {
        if (!inviteText) inviteText = buildInviteText(myUserId);

        if (!window.liff || typeof liff.shareTargetPicker !== "function") {
          statusEl.textContent = "請在 LINE App 內開啟再分享";
          return;
        }
        if (typeof liff.isInClient === "function" && !liff.isInClient()) {
          statusEl.textContent = "請在 LINE App 內開啟再分享";
          return;
        }

        const result = await liff.shareTargetPicker([{ type: "text", text: inviteText }]);
        if (result) {
          statusEl.textContent = "已開啟分享，請選好友送出";
        } else {
          statusEl.textContent = "已取消，可再點大按鈕重試";
        }
      } catch (error) {
        showError(error);
        statusEl.textContent = "分享沒成功，請再點大按鈕試試";
      } finally {
        sharing = false;
        shareBtn.disabled = shareBlocked ? true : false;
      }
    }

    async function initializeLiff() {
      inviteText = buildInviteText("");
      try {
        if (!window.liff) throw new Error("LIFF SDK 未載入");

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          statusEl.textContent = "前往 LINE 登入…";
          try {
            liff.login({ redirectUri: buildSafeRedirectUri() });
          } catch (loginErr) {
            try {
              liff.login();
            } catch (loginErr2) {
              showError(loginErr2 || loginErr);
              statusEl.textContent = "登入失敗，請關閉後再從圖文選單進入";
            }
          }
          return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const inviteFrom = urlParams.get("invite_from");

        try {
          const profile = await liff.getProfile();
          myUserId = (profile && profile.userId) || "";
        } catch (profileErr) {
          showError(profileErr);
          myUserId = "";
        }

        if (inviteFrom && myUserId && inviteFrom !== myUserId) {
          shareBlocked = true;
          leadEl.textContent = "這是別人的邀請連結，請回官方帳號首頁完成綁定";
          statusEl.textContent = "此頁只給邀請人分享用";
          shareBtn.disabled = true;
          ready = false;
          return;
        }

        setReadyUi("準備好了，請點「分享給好友」");
      } catch (error) {
        showError(error);
        statusEl.textContent = "載入失敗，請關閉後再從圖文選單進入";
        shareBtn.disabled = false;
        ready = true;
      }
    }

    shareBtn.addEventListener("click", onShareClick);

    setTimeout(function () {
      if (ready || shareBlocked) return;
      inviteText = inviteText || buildInviteText(myUserId);
      shareBtn.disabled = false;
      ready = true;
      if (statusEl.textContent.indexOf("準備好") === -1 && statusEl.textContent.indexOf("前往 LINE") === -1) {
        statusEl.textContent = "可再點大按鈕試試分享";
      }
    }, 8000);

    initializeLiff();
  </script>
</body>
</html>
