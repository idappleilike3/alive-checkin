<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護人設定 - 今天還在嗎</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #F5F5F5;
    color: #333;
    padding: 20px;
    line-height: 1.6;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 480px;
    margin: 0 auto 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 { font-size: 24px; color: #00B900; margin-bottom: 12px; }
  h2 { font-size: 18px; color: #555; margin: 16px 0 8px; }
  .btn-primary {
    display: block;
    width: 100%;
    padding: 16px;
    background: #00B900;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
  }
  .contact-item {
    border: 1px solid #E0E0E0;
    border-radius: 12px;
    padding: 12px;
    margin: 8px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #00B900;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
  }
  .name { flex: 1; font-size: 16px; font-weight: 600; }
  .phone { font-size: 13px; color: #888; }
  .status { padding: 12px; background: #FFF4E5; border-radius: 8px; color: #92400E; margin: 12px 0; }
</style>
</head>
<body>
<div class="card">
  <h1>👨‍👩‍👧 守護人設定</h1>
  <p>設定最關心的家人/朋友,出事時系統會自動通知他們。</p>

  <div class="status">
    ⚠️ 你目前還沒有設定守護人,逾期未簽到時不會通知任何人
  </div>

  <h2>已綁定(0/3)</h2>
  <p style="color: #888;">尚未綁定守護人,點下方按鈕開始</p>

  <button class="btn-primary" onclick="alert('此功能即將上線,目前請到 LINE 主選單私訊「平安守護助理」打「綁定守護人」')">
    ➕ 邀請守護人(LINE 好友)
  </button>
</div>

<div class="card">
  <h2>💡 守護人是誰?</h2>
  <p>• 家人(子女、孫輩)</p>
  <p>• 信任的朋友/鄰居</p>
  <p>• 社區關懷員</p>
  <p>最多可設 3 位核心守護人 + 其他通知對象</p>
</div>

<div class="card">
  <h2>📡 通知方式</h2>
  <p>• LINE 訊息(預設)</p>
  <p>• SMS 簡訊(799 守護版)</p>
  <p>• 語音通話(799 守護版 + 進階設定)</p>
</div>
</body>
</html>
