<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的會員 - 今天還在嗎</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #F5F5F5;
    color: #333;
    padding: 20px;
    line-height: 1.6;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 480px;
    margin: 0 auto 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 { font-size: 24px; color: #00B900; margin-bottom: 12px; }
  h2 { font-size: 18px; color: #555; margin: 16px 0 12px; }
  .plan-box {
    background: linear-gradient(135deg, #00B900, #00C853);
    color: #fff;
    border-radius: 12px;
    padding: 20px;
    margin: 12px 0;
  }
  .plan-name { font-size: 24px; font-weight: 700; }
  .plan-detail { font-size: 14px; opacity: 0.9; margin-top: 4px; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #00B900;
    background: #fff;
    color: #00B900;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin: 8px 0;
    text-align: center;
    text-decoration: none;
  }
  .btn-primary {
    background: #00B900;
    color: #fff;
  }
  .btn-danger {
    border-color: #D32F2F;
    color: #D32F2F;
    background: #fff;
  }
  .btn-edit {
    background: #00B900;
    border-color: #00B900;
    color: #fff;
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .guardian-row {
    border: 1px solid #E0E0E0;
    border-radius: 12px;
    padding: 16px;
    margin: 12px 0;
    background: #FAFAFA;
    display: grid;
    gap: 8px;
  }
  .guardian-row.primary {
    border-color: #00B900;
    background: #F0F9F4;
  }
  .guardian-name { font-weight: 800; font-size: 18px; color: #00B900; }
  .guardian-detail { font-size: 16px; color: #555; line-height: 1.5; }
  .guardian-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
    width: 100%;
  }
  .guardian-actions .btn {
    margin: 0;
    min-height: 48px;
    padding: 12px 14px;
    font-size: 16px;
    font-weight: 800;
    border-radius: 12px;
    box-sizing: border-box;
  }
  .contact-actions {
    display: grid;
    gap: 10px;
    margin-top: 16px;
  }
  .contact-actions .btn { margin: 0; min-height: 52px; font-size: 17px; }
  .reminder-slot { margin: 10px 0; }
  .reminder-slot label {
    display: block;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .reminder-slot input[type="time"] {
    width: 100%;
    padding: 12px;
    border: 2px solid #E0E0E0;
    border-radius: 8px;
    font-size: 17px;
  }
  .empty {
    padding: 16px;
    text-align: center;
    color: #888;
    background: #F9FAFB;
    border-radius: 8px;
    border: 1px dashed #E0E0E0;
  }
  .lock-box {
    background: linear-gradient(135deg, #FFD54F, #FFA000);
    color: #fff;
    border-radius: 12px;
    padding: 16px;
    margin: 12px 0;
  }
  .status-saved {
    padding: 12px;
    background: #E8F8EE;
    border-radius: 8px;
    color: #006400;
    margin: 8px 0;
    display: none;
  }
  .hint { color: #666; font-size: 14px; margin-bottom: 8px; }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    display: grid;
    place-items: start center;
    padding: 20px 12px;
    overflow-y: auto;
    z-index: 40;
  }
  .modal-backdrop[hidden] { display: none; }
  .modal-card {
    width: min(100%, 440px);
    background: #fff;
    border-radius: 16px;
    padding: 22px 18px;
    margin-bottom: 24px;
  }
  .form-field {
    display: grid;
    gap: 6px;
    margin: 12px 0;
  }
  .form-field > span {
    font-size: 15px;
    font-weight: 700;
  }
  .form-field input,
  .form-field select,
  .form-field textarea {
    width: 100%;
    min-height: 48px;
    padding: 12px 14px;
    border: 1.5px solid #E0E0E0;
    border-radius: 10px;
    font-size: 17px;
    line-height: 1.4;
  }
  .form-field textarea { min-height: 72px; }
  .check-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 12px 0;
    font-size: 15px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>⭐ 我的會員</h1>
  <p>查看訂閱、管理守護人、設定提醒時間</p>

  <div class="plan-box" id="planBox">
    <div class="plan-name" id="planName">載入中...</div>
    <div class="plan-detail" id="planDetail"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" type="button" onclick="location.href='./pricing.html'">續約方案</button>
    <button class="btn" type="button" onclick="location.href='./pricing.html'">變更方案</button>
  </div>
</div>

<!-- 守護人管理（會員中心：編輯／刪除在此） -->
<div class="card">
  <h2>👨‍👩‍👧 守護人聯絡人</h2>
  <p class="hint">依優先順序顯示。編輯／刪除在列表內操作；需要新增時再按下方按鈕。</p>
  <div id="guardianList">
    <div class="empty">載入中...</div>
  </div>
  <div class="contact-actions">
    <button class="btn btn-primary" type="button" id="addGuardianBtn">＋ 新增聯絡人</button>
    <button class="btn" type="button" id="shareInviteBtn">一鍵分享邀請守護人</button>
  </div>
  <p class="hint" id="shareHint" style="display:none;color:#006400;"></p>
</div>

<!-- 每日提醒時間設定 -->
<div class="card">
  <h2>⏰ 每日提醒時間</h2>
  <p class="hint" id="reminderHint">依方案設定每日提醒次數與時段。</p>
  <div id="reminderSlots"></div>
  <button class="btn" type="button" id="useDefaultsBtn">使用方案預設時間</button>
  <div class="status-saved" id="statusSaved">✅ 已儲存!</div>
  <button class="btn btn-primary" id="saveBtn" onclick="saveReminder()">儲存設定</button>
</div>

<!-- 守護群(799 限定) -->
<div class="card">
  <h2>🛡️ 守護群</h2>
  <div class="lock-box">
    <strong>📋 守護群資格</strong>
    <p>• 訂閱 799 月費或年費</p>
    <p>• 月費最多 1 群 / 年費最多 3 群</p>
    <p>• 每群最多 50 人</p>
  </div>
  <a href="./guardian-groups.html" class="btn">查看守護群設定</a>
</div>

<div class="modal-backdrop" id="editorModal" hidden>
  <div class="modal-card">
    <h2 id="editorTitle">編輯守護人</h2>
    <p class="hint" id="editorError" style="color:#D32F2F;display:none;"></p>
    <label class="form-field"><span>姓名（必填）</span>
      <input id="gName" type="text" placeholder="例如：王小明" autocomplete="name">
    </label>
    <label class="form-field"><span>關係（必填）</span>
      <select id="gRelationship">
        <option value="">請選擇關係</option>
        <option value="配偶">配偶</option>
        <option value="父母">父母</option>
        <option value="子女">子女</option>
        <option value="兄弟姊妹">兄弟姊妹</option>
        <option value="親戚">親戚</option>
        <option value="家人">家人</option>
        <option value="朋友">朋友</option>
        <option value="鄰居">鄰居</option>
        <option value="同事">同事</option>
        <option value="照護人員">照護人員</option>
        <option value="其他">其他</option>
      </select>
    </label>
    <label class="form-field"><span>手機</span>
      <input id="gPhone" type="tel" inputmode="tel" placeholder="例如：0912 345 678" autocomplete="tel">
    </label>
    <label class="form-field"><span>EMAIL</span>
      <input id="gEmail" type="email" inputmode="email" placeholder="例如：name@example.com" autocomplete="email">
    </label>
    <label class="check-row">
      <input type="checkbox" id="gIsPrimary">
      <span>設為主要聯絡人</span>
    </label>
    <p class="hint">姓名與關係必填；手機與 EMAIL 至少填一個。</p>
    <div class="btn-row">
      <button class="btn" type="button" id="cancelEditorBtn">取消</button>
      <button class="btn btn-primary" type="button" id="saveEditorBtn">儲存</button>
    </div>
  </div>
</div>

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = "2010674803-rK98c0lo";
const API_BASE = "https://alive-checkin.onrender.com";
const DEFAULT_REMINDER_TIMES_BY_COUNT = {
  1: ["12:00"],
  2: ["12:00", "18:00"],
  3: ["12:00", "18:00", "22:00"],
};

let state = {
  lineUserId: null,
  reminderTimes: ["12:00"],
  dailyReminders: 1,
  guardians: [],
  editId: null
};

function defaultTimesForCount(count) {
  const n = Math.max(1, Math.min(3, Number(count) || 1));
  return (DEFAULT_REMINDER_TIMES_BY_COUNT[n] || DEFAULT_REMINDER_TIMES_BY_COUNT[1]).slice();
}

function renderReminderSlots(times) {
  const host = document.getElementById("reminderSlots");
  const count = Math.max(1, Math.min(3, state.dailyReminders || times.length || 1));
  const values = (times && times.length ? times : defaultTimesForCount(count)).slice(0, count);
  while (values.length < count) values.push(defaultTimesForCount(count)[values.length] || "12:00");
  host.innerHTML = values.map((time, index) => `
    <div class="reminder-slot">
      <label for="memberReminder${index}">第 ${index + 1} 次提醒</label>
      <input type="time" id="memberReminder${index}" value="${escape(time)}" />
    </div>
  `).join("");
}

function readReminderTimes() {
  const count = state.dailyReminders || 1;
  const times = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById(`memberReminder${i}`);
    if (el && el.value) times.push(el.value);
  }
  return times;
}

async function resolveLiffId() {
  try {
    const res = await fetch(`${API_BASE}/api/config`);
    if (res.ok) {
      const cfg = await res.json();
      if (cfg.liff_id) return cfg.liff_id;
    }
  } catch (_) {}
  return LIFF_ID;
}

async function init() {
  try {
    const liffId = await resolveLiffId();
    await liff.init({ liffId });
    if (!liff.isLoggedIn()) {
      // 絕對不要自己帶 redirectUri
      liff.login();
      return;
    }

    state.lineUserId = (await liff.getProfile()).userId;

    const r1 = await fetch(`${API_BASE}/api/onboarding/state?line_user_id=${state.lineUserId}`);
    if (r1.ok) {
      const d = await r1.json();
      state.dailyReminders = Number(d.daily_reminders) || 1;
      state.reminderTimes = (d.reminder_times && d.reminder_times.length)
        ? d.reminder_times
        : (d.default_reminder_times || defaultTimesForCount(state.dailyReminders));
      document.getElementById("planName").textContent = d.plan || "尚未訂閱";
      document.getElementById("planDetail").textContent = d.plan
        ? `每日提醒 ${state.dailyReminders} 次`
        : "升級 799 守護版可開守護群";
      document.getElementById("reminderHint").textContent =
        `本方案每日可設定 ${state.dailyReminders} 個提醒時段。未自訂時預設：${(d.default_reminder_times || defaultTimesForCount(state.dailyReminders)).join("、")}`;
    }

    await refreshGuardians();
    renderReminderSlots(state.reminderTimes);
  } catch (err) {
    console.error(err);
  }
}

async function refreshGuardians() {
  const r2 = await fetch(`${API_BASE}/api/contacts?line_user_id=${state.lineUserId}`);
  if (r2.ok) {
    const d = await r2.json();
    state.guardians = d.contacts || [];
    renderGuardians();
  }
}

function renderGuardians() {
  const list = document.getElementById("guardianList");
  if (!state.guardians.length) {
    list.innerHTML = '<div class="empty">尚未綁定守護人，請新增或分享邀請連結</div>';
    return;
  }
  list.innerHTML = state.guardians.map((g, i) => {
    const bound = g.binding_status === "accepted" || g.consent_status === "accepted" || g.line_id;
    return `
    <div class="guardian-row ${g.is_primary || i === 0 ? "primary" : ""}">
      <div class="guardian-name">${i + 1}. ${escape(g.name || "守護人 " + (i + 1))}${g.is_primary || i === 0 ? " ⭐ 主要" : ""}</div>
      <div class="guardian-detail">${escape(g.relationship || "關係未設定")}</div>
      <div class="guardian-detail">${escape(g.phone || g.email || "未填聯絡方式")}</div>
      <div class="guardian-detail">${bound ? "✅ LINE 已綁定" : "⏳ 等待 LINE 綁定"}</div>
      <div class="guardian-actions">
        <button class="btn btn-edit" type="button" data-edit="${escape(g.id)}">編輯</button>
        <button class="btn btn-danger" type="button" data-delete="${escape(g.id)}">刪除</button>
      </div>
    </div>`;
  }).join("");
  list.querySelectorAll("[data-edit]").forEach((btn) => {
    btn.addEventListener("click", () => openEditor(btn.dataset.edit));
  });
  list.querySelectorAll("[data-delete]").forEach((btn) => {
    btn.addEventListener("click", () => deleteGuardian(btn.dataset.delete));
  });
}

function buildInviteText() {
  const safeId = String(state.lineUserId || "").replace(/[^a-zA-Z0-9_-]/g, "");
  // 單一乾淨 URL：line.me/R/app?invite_from=（強制 LINE，避開 /? → 400）
  const bindUrl = safeId
    ? `https://line.me/R/app/${LIFF_ID}?invite_from=${encodeURIComponent(safeId)}`
    : `https://line.me/R/app/${LIFF_ID}?open=onboarding`;
  return (
    `我想邀請你成為「每日平安」的守護人。\n` +
    `請用 LINE 點開下面連結\n\n` +
    `${bindUrl}`
  );
}

async function shareGuardianInvite() {
  // 產品路徑：只進專用 LINE 好友分享頁（shareTargetPicker）
  location.assign("/liff/share-invite.html");
}

function openEditor(contactId) {
  const modal = document.getElementById("editorModal");
  const err = document.getElementById("editorError");
  err.style.display = "none";
  state.editId = contactId || null;
  const g = state.guardians.find((x) => x.id === contactId);
  document.getElementById("editorTitle").textContent = g ? "編輯守護人" : "新增守護人";
  document.getElementById("gName").value = g?.name || "";
  const rel = document.getElementById("gRelationship");
  const relationship = g?.relationship || "家人";
  if (relationship && !Array.from(rel.options).some((o) => o.value === relationship)) {
    const opt = document.createElement("option");
    opt.value = relationship;
    opt.textContent = relationship;
    rel.appendChild(opt);
  }
  rel.value = relationship;
  document.getElementById("gPhone").value = g?.phone || "";
  document.getElementById("gEmail").value = g?.email || "";
  document.getElementById("gIsPrimary").checked = Boolean(g?.is_primary || (!g && !state.guardians.length));
  modal.hidden = false;
}

function closeEditor() {
  document.getElementById("editorModal").hidden = true;
  state.editId = null;
}

async function saveEditor() {
  const err = document.getElementById("editorError");
  const payload = {
    line_user_id: state.lineUserId,
    name: document.getElementById("gName").value.trim(),
    relationship: document.getElementById("gRelationship").value.trim(),
    phone: document.getElementById("gPhone").value.trim(),
    email: document.getElementById("gEmail").value.trim(),
    is_primary: document.getElementById("gIsPrimary").checked
  };
  if (!payload.name || !payload.relationship) {
    err.style.display = "block";
    err.textContent = "請填寫姓名與關係";
    return;
  }
  if (!payload.phone && !payload.email) {
    err.style.display = "block";
    err.textContent = "手機與 EMAIL 至少填一個";
    return;
  }
  const btn = document.getElementById("saveEditorBtn");
  btn.disabled = true;
  btn.textContent = "儲存中...";
  try {
    const url = state.editId
      ? `${API_BASE}/api/contacts/${encodeURIComponent(state.editId)}`
      : `${API_BASE}/api/contacts/add`;
    const method = state.editId ? "PUT" : "POST";
    const res = await fetch(url, {
      method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok || data.ok === false) {
      err.style.display = "block";
      err.textContent = data.message || data.error || "儲存失敗";
    } else {
      state.guardians = data.contacts || state.guardians;
      renderGuardians();
      closeEditor();
    }
  } catch (e) {
    err.style.display = "block";
    err.textContent = "網路錯誤：" + e.message;
  }
  btn.disabled = false;
  btn.textContent = "儲存";
}

async function deleteGuardian(contactId) {
  const g = state.guardians.find((x) => x.id === contactId);
  if (!g || !confirm(`確定要刪除守護人「${g.name || "未命名"}」嗎？`)) return;
  try {
    const res = await fetch(`${API_BASE}/api/contacts/${encodeURIComponent(contactId)}?line_user_id=${encodeURIComponent(state.lineUserId)}`, {
      method: "DELETE"
    });
    const data = await res.json();
    if (!res.ok || data.ok === false) {
      alert(data.error || "刪除失敗");
      return;
    }
    state.guardians = data.contacts || [];
    renderGuardians();
  } catch (e) {
    alert("刪除失敗：" + e.message);
  }
}

document.getElementById("useDefaultsBtn").addEventListener("click", () => {
  renderReminderSlots(defaultTimesForCount(state.dailyReminders));
});
document.getElementById("shareInviteBtn").addEventListener("click", shareGuardianInvite);
document.getElementById("addGuardianBtn").addEventListener("click", async () => {
  await shareGuardianInvite();
  openEditor(null);
});
document.getElementById("cancelEditorBtn").addEventListener("click", closeEditor);
document.getElementById("saveEditorBtn").addEventListener("click", saveEditor);

async function saveReminder() {
  const btn = document.getElementById("saveBtn");
  let times = readReminderTimes();
  if (times.length < state.dailyReminders) {
    times = defaultTimesForCount(state.dailyReminders);
  }
  btn.disabled = true;
  btn.textContent = "儲存中...";
  try {
    const res = await fetch(`${API_BASE}/api/onboarding/reminder`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        line_user_id: state.lineUserId,
        reminder_times: times,
        reminder_time: times[0]
      })
    });
    if (res.ok) {
      const data = await res.json();
      state.reminderTimes = data.reminder_times || times;
      const status = document.getElementById("statusSaved");
      status.style.display = "block";
      setTimeout(() => status.style.display = "none", 3000);
    } else {
      alert("儲存失敗");
    }
  } catch (err) {
    alert("網路錯誤:" + err.message);
  }
  btn.disabled = false;
  btn.textContent = "儲存設定";
}

function escape(s) {
  return String(s || "").replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
</body>
</html>
