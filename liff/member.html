<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的會員 - 今天還在嗎</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #F5F5F5;
    color: #333;
    padding: 20px;
    line-height: 1.6;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 480px;
    margin: 0 auto 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 { font-size: 24px; color: #00B900; margin-bottom: 12px; }
  h2 { font-size: 18px; color: #555; margin: 16px 0 12px; }
  .plan-box {
    background: linear-gradient(135deg, #00B900, #00C853);
    color: #fff;
    border-radius: 12px;
    padding: 20px;
    margin: 12px 0;
  }
  .plan-name { font-size: 24px; font-weight: 700; }
  .plan-detail { font-size: 14px; opacity: 0.9; margin-top: 4px; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #00B900;
    background: #fff;
    color: #00B900;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin: 8px 0;
    text-align: center;
    text-decoration: none;
  }
  .btn-primary {
    background: #00B900;
    color: #fff;
  }
  .guardian-row {
    border: 1px solid #E0E0E0;
    border-radius: 10px;
    padding: 12px;
    margin: 8px 0;
    background: #FAFAFA;
  }
  .guardian-row.primary {
    border-color: #00B900;
    background: #F0F9F4;
  }
  .guardian-name { font-weight: 700; font-size: 16px; color: #00B900; }
  .guardian-detail { font-size: 13px; color: #666; margin-top: 4px; }
  .reminder-slot {
    margin: 10px 0;
  }
  .reminder-slot label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .reminder-slot input[type="time"] {
    width: 100%;
    padding: 12px;
    border: 2px solid #E0E0E0;
    border-radius: 8px;
    font-size: 16px;
  }
  .empty {
    padding: 16px;
    text-align: center;
    color: #888;
    background: #F9FAFB;
    border-radius: 8px;
    border: 1px dashed #E0E0E0;
  }
  .lock-box {
    background: linear-gradient(135deg, #FFD54F, #FFA000);
    color: #fff;
    border-radius: 12px;
    padding: 16px;
    margin: 12px 0;
  }
  .status-saved {
    padding: 12px;
    background: #E8F8EE;
    border-radius: 8px;
    color: #006400;
    margin: 8px 0;
    display: none;
  }
  .hint { color: #666; font-size: 14px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>⭐ 我的會員</h1>
  <p>查看訂閱、管理守護人、設定提醒時間</p>

  <div class="plan-box" id="planBox">
    <div class="plan-name" id="planName">載入中...</div>
    <div class="plan-detail" id="planDetail"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary">續約方案</button>
    <button class="btn">變更方案</button>
  </div>
</div>

<!-- 守護人管理（會員中心設定） -->
<div class="card">
  <h2>👨‍👩‍👧 守護人管理</h2>
  <p class="hint">在這裡新增守護人，或一鍵分享邀請連結給家人朋友綁定。</p>
  <div id="guardianList">
    <div class="empty">載入中...</div>
  </div>
  <a href="https://liff.line.me/2010674803-rK98c0lo?open=onboarding" class="btn btn-primary">➕ 新增守護人</a>
  <button class="btn" type="button" id="shareInviteBtn">📲 一鍵分享邀請守護人</button>
  <p class="hint" id="shareHint" style="display:none;color:#006400;"></p>
</div>

<!-- 每日提醒時間設定 -->
<div class="card">
  <h2>⏰ 每日提醒時間</h2>
  <p class="hint" id="reminderHint">依方案設定每日提醒次數與時段。</p>
  <div id="reminderSlots"></div>
  <button class="btn" type="button" id="useDefaultsBtn">使用方案預設時間</button>
  <div class="status-saved" id="statusSaved">✅ 已儲存!</div>
  <button class="btn btn-primary" id="saveBtn" onclick="saveReminder()">儲存設定</button>
</div>

<!-- 守護群(799 限定) -->
<div class="card">
  <h2>🛡️ 守護群</h2>
  <div class="lock-box">
    <strong>📋 守護群資格</strong>
    <p>• 訂閱 799 月費或年費</p>
    <p>• 月費最多 1 群 / 年費最多 3 群</p>
    <p>• 每群最多 50 人</p>
  </div>
  <a href="./guardian-groups.html" class="btn">查看守護群設定</a>
</div>

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = "2010674803-rK98c0lo";
const API_BASE = "https://alive-checkin.onrender.com";
const DEFAULT_REMINDER_TIMES_BY_COUNT = {
  1: ["12:00"],
  2: ["12:00", "18:00"],
  3: ["12:00", "18:00", "22:00"],
};

let state = {
  lineUserId: null,
  reminderTimes: ["12:00"],
  dailyReminders: 1,
  guardians: []
};

function defaultTimesForCount(count) {
  const n = Math.max(1, Math.min(3, Number(count) || 1));
  return (DEFAULT_REMINDER_TIMES_BY_COUNT[n] || DEFAULT_REMINDER_TIMES_BY_COUNT[1]).slice();
}

function renderReminderSlots(times) {
  const host = document.getElementById("reminderSlots");
  const count = Math.max(1, Math.min(3, state.dailyReminders || times.length || 1));
  const values = (times && times.length ? times : defaultTimesForCount(count)).slice(0, count);
  while (values.length < count) values.push(defaultTimesForCount(count)[values.length] || "12:00");
  host.innerHTML = values.map((time, index) => `
    <div class="reminder-slot">
      <label for="memberReminder${index}">第 ${index + 1} 次提醒</label>
      <input type="time" id="memberReminder${index}" value="${escape(time)}" />
    </div>
  `).join("");
}

function readReminderTimes() {
  const count = state.dailyReminders || 1;
  const times = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById(`memberReminder${i}`);
    if (el && el.value) times.push(el.value);
  }
  return times;
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    state.lineUserId = (await liff.getProfile()).userId;

    const r1 = await fetch(`${API_BASE}/api/onboarding/state?line_user_id=${state.lineUserId}`);
    if (r1.ok) {
      const d = await r1.json();
      state.dailyReminders = Number(d.daily_reminders) || 1;
      state.reminderTimes = (d.reminder_times && d.reminder_times.length)
        ? d.reminder_times
        : (d.default_reminder_times || defaultTimesForCount(state.dailyReminders));
      document.getElementById("planName").textContent = d.plan || "尚未訂閱";
      document.getElementById("planDetail").textContent = d.plan
        ? `每日提醒 ${state.dailyReminders} 次`
        : "升級 799 守護版可開守護群";
      document.getElementById("reminderHint").textContent =
        `本方案每日可設定 ${state.dailyReminders} 個提醒時段。未自訂時預設：${(d.default_reminder_times || defaultTimesForCount(state.dailyReminders)).join("、")}`;
    }

    const r2 = await fetch(`${API_BASE}/api/contacts?line_user_id=${state.lineUserId}`);
    if (r2.ok) {
      const d = await r2.json();
      state.guardians = d.contacts || [];
      renderGuardians();
    }

    renderReminderSlots(state.reminderTimes);
  } catch (err) {
    console.error(err);
  }
}

function renderGuardians() {
  const list = document.getElementById("guardianList");
  if (!state.guardians.length) {
    list.innerHTML = '<div class="empty">尚未綁定守護人，請新增或分享邀請連結</div>';
    return;
  }
  list.innerHTML = state.guardians.map((g, i) => {
    const bound = g.binding_status === "accepted" || g.consent_status === "accepted" || g.line_id;
    return `
    <div class="guardian-row ${i === 0 ? "primary" : ""}">
      <div class="guardian-name">${escape(g.name || "守護人 " + (i + 1))} ${i === 0 ? "⭐ 主要" : ""}</div>
      <div class="guardian-detail">${escape(g.relationship || "關係未設定")} · ${escape(g.phone || "未填手機")}</div>
      <div class="guardian-detail">${bound ? "✅ LINE 已綁定" : "⏳ 等待 LINE 綁定"}</div>
    </div>`;
  }).join("");
}

function buildInviteText() {
  const bindUrl = `https://liff.line.me/${LIFF_ID}?invite_from=${encodeURIComponent(state.lineUserId || "")}`;
  return (
    `我想邀請你成為「今天還在嗎」的守護人。\n\n` +
    `【如何綁定】\n` +
    `1. 點下方連結，用 LINE 開啟\n` +
    `2. 登入並同意成為守護人\n` +
    `3. 綁定完成後，若我未準時報平安或發出 SOS，你會收到通知\n\n` +
    `守護邀請連結：\n${bindUrl}`
  );
}

async function shareGuardianInvite() {
  if (!state.lineUserId) {
    alert("請先完成 LINE 登入");
    return;
  }
  const text = buildInviteText();
  const hint = document.getElementById("shareHint");
  try {
    if (window.liff && liff.isInClient && liff.isInClient() && liff.shareTargetPicker) {
      await liff.shareTargetPicker([{ type: "text", text }]);
      if (hint) { hint.style.display = "block"; hint.textContent = "✅ 已開啟分享，選好友送出即可"; }
    } else if (navigator.share) {
      await navigator.share({ title: "今天還在嗎 守護人邀請", text });
    } else if (navigator.clipboard) {
      await navigator.clipboard.writeText(text);
      alert("邀請文案已複製，可貼到 LINE 傳給對方");
    } else {
      alert(text);
    }
  } catch (err) {
    if (hint) { hint.style.display = "block"; hint.textContent = "分享已取消，可再按一次"; }
  }
}

document.getElementById("useDefaultsBtn").addEventListener("click", () => {
  renderReminderSlots(defaultTimesForCount(state.dailyReminders));
});
document.getElementById("shareInviteBtn").addEventListener("click", shareGuardianInvite);

async function saveReminder() {
  const btn = document.getElementById("saveBtn");
  let times = readReminderTimes();
  if (times.length < state.dailyReminders) {
    times = defaultTimesForCount(state.dailyReminders);
  }
  btn.disabled = true;
  btn.textContent = "儲存中...";
  try {
    const res = await fetch(`${API_BASE}/api/onboarding/reminder`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        line_user_id: state.lineUserId,
        reminder_times: times,
        reminder_time: times[0]
      })
    });
    if (res.ok) {
      const data = await res.json();
      state.reminderTimes = data.reminder_times || times;
      const status = document.getElementById("statusSaved");
      status.style.display = "block";
      setTimeout(() => status.style.display = "none", 3000);
    } else {
      alert("儲存失敗");
    }
  } catch (err) {
    alert("網路錯誤:" + err.message);
  }
  btn.disabled = false;
  btn.textContent = "儲存設定";
}

function escape(s) {
  return String(s || "").replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
</body>
</html>
