<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOS 緊急求救 - 今天還在嗎</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(180deg, #8B0000 0%, #4A0000 100%);
    min-height: 100vh;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }
  .header {
    text-align: center;
    padding: 32px 0;
  }
  .icon {
    font-size: 80px;
    margin-bottom: 16px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #FFE4E1;
    margin-bottom: 12px;
  }
  .header p {
    font-size: 18px;
    color: #FFD0D0;
  }
  .confirm-box {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 24px;
    margin: 32px 0;
    text-align: center;
  }
  .confirm-question {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    color: #FFE4E1;
  }
  .countdown {
    font-size: 56px;
    font-weight: 700;
    color: #FF6B6B;
    margin: 20px 0;
    font-variant-numeric: tabular-nums;
  }
  .countdown.warning {
    color: #FF0000;
    animation: flash 0.5s infinite;
  }
  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .sos-button {
    display: block;
    width: 100%;
    padding: 20px;
    margin-bottom: 16px;
    background: #E74C3C;
    color: #ffffff;
    border: none;
    border-radius: 16px;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(231, 76, 60, 0.5);
  }
  .sos-button:active { transform: scale(0.96); }
  .sos-button:disabled { background: #888; cursor: not-allowed; box-shadow: none; }
  .cancel-button {
    display: block;
    width: 100%;
    padding: 16px;
    background: transparent;
    color: #FFD0D0;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
  }
  .cancel-button:active { background: rgba(255, 255, 255, 0.1); }
  .warning-box {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 12px;
    padding: 16px;
    margin-top: 24px;
    font-size: 14px;
  }
  .warning-box p { margin-bottom: 8px; color: #FFD0D0; }
  .warning-box .urgent {
    color: #FF6B6B;
    font-weight: 700;
    font-size: 16px;
    margin-top: 12px;
  }
  .warning-box .phone {
    color: #FFEB3B;
    font-size: 22px;
    font-weight: 700;
  }
  .status-sent {
    display: none;
    text-align: center;
    padding: 32px;
  }
  .status-sent.show { display: block; }
  .status-sent .big-icon {
    font-size: 96px;
    margin-bottom: 16px;
  }
  .status-sent h2 {
    font-size: 28px;
    color: #2ECC71;
    margin-bottom: 12px;
  }
  .status-sent p {
    font-size: 16px;
    color: #FFD0D0;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 確認頁面 -->
  <div id="confirmPage">
    <header class="header">
      <div class="icon">🚨</div>
      <h1>SOS 緊急求救</h1>
      <p>您的親友將立刻收到通知<br>並看到您目前的位置</p>
    </header>

    <div class="confirm-box">
      <div class="confirm-question">您確定要發出 SOS 嗎?</div>
      <div class="countdown" id="countdown">5</div>
      <div style="color: #FFD0D0; font-size: 14px; margin-bottom: 16px;">秒後自動發出</div>
      <button class="sos-button" id="confirmBtn">🚨 確認發出 SOS</button>
      <button class="cancel-button" id="cancelBtn">取消</button>
    </div>

    <div class="warning-box">
      <p>⚠️ SOS 是救命功能,請只在<strong>真正緊急</strong>時使用</p>
      <p>若是醫療 / 火災 / 搶劫,請<strong>直接撥打</strong>:</p>
      <p class="phone">📞 119(消防/救護)</p>
      <p class="phone">📞 110(警察)</p>
      <p class="phone">📞 112(手機無訊號)</p>
    </div>
  </div>

  <!-- 已發出頁面 -->
  <div id="sentPage" class="status-sent">
    <div class="big-icon">✅</div>
    <h2>SOS 已發出</h2>
    <p>您的 5 位核心聯絡人已收到通知</p>
    <p>請保持冷靜,等待救援</p>
    <p style="margin-top: 24px; font-size: 14px;">3 秒後自動關閉...</p>
  </div>

</div>

<script>
  var countdown = 5;
  var countdownEl = document.getElementById('countdown');
  var confirmBtn = document.getElementById('confirmBtn');
  var cancelBtn = document.getElementById('cancelBtn');
  var timer = null;

  function updateCountdown() {
    countdown--;
    countdownEl.textContent = countdown;
    if (countdown <= 2) {
      countdownEl.classList.add('warning');
    }
    if (countdown <= 0) {
      sendSOS();
    }
  }

  function startCountdown() {
    timer = setInterval(updateCountdown, 1000);
  }

  function sendSOS() {
    clearInterval(timer);
    confirmBtn.disabled = true;
    cancelBtn.disabled = true;
    document.getElementById('confirmPage').style.display = 'none';
    document.getElementById('sentPage').classList.add('show');

    // TODO: 呼叫後端 trigger_sos API
    // fetch('/api/sos', { method: 'POST', body: JSON.stringify({line_user_id: LIFF_USER_ID}) })

    // 3 秒後自動關閉(LIFF)
    setTimeout(function() {
      if (window.liff) {
        window.liff.closeWindow();
      }
    }, 3000);
  }

  function cancelSOS() {
    clearInterval(timer);
    if (window.liff) {
      window.liff.closeWindow();
    } else {
      window.history.back();
    }
  }

  confirmBtn.addEventListener('click', sendSOS);
  cancelBtn.addEventListener('click', cancelSOS);

  // 啟動倒數
  startCountdown();
</script>

</body>
</html>
