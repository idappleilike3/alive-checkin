      <h1>服務條款</h1>
      <p>「還活著嗎」提供每日平安簽到、提醒與緊急聯絡人管理功能。本服務用來協助使用者建立日常確認習慣，不能取代醫療、救護、警政或其他正式緊急服務。</p>
      <h2>使用規則</h2>
      <p>使用者需自行確認簽到時間、緊急聯絡人資料與通知設定是否正確。若使用者未準時簽到，系統會依方案設定提醒或通知，但不保證任何第三方一定會即時收到或處理。</p>
      <h2>付費方案</h2>
      <p>付費方案於 MVP 階段可由管理者手動開通。實際收費、退款與訂閱規則，以付款頁或雙方約定內容為準。</p>
      <h2>責任限制</h2>
      <p>本服務可能因網路、LINE、簡訊、電話供應商或主機服務異常而延遲或中斷。使用者仍應保留其他安全聯絡方式。</p>
