services:
  - type: web
    name: alive-checkin
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: LIFF_ID
        value: 2010674803-rK98c0lo
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: DATA_FILE
        value: data/state.json
      - key: ADMIN_PASSWORD
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
