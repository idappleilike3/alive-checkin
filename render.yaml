services:
  - type: web
    name: alive-checkin
    env: python
    # Persistent Disk requires a paid instance (Starter+). Free cannot attach disks.
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    disk:
      name: alive-checkin-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LIFF_ID
        value: 2010674803-rK98c0lo
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: APP_TIMEZONE
        value: Asia/Taipei
      # SQLite lives on the Persistent Disk (state.json → state.db sibling).
      - key: DATA_FILE
        value: /var/data/state.json
      - key: REQUIRE_LIFF_AUTH
        value: "1"
      - key: DEPLOY_VERSION
        value: W250724ar
      # Open admin (no password). Public URL is insecure — owner requested.
      - key: ALLOW_OPEN_ADMIN
        value: "true"
      - key: ADMIN_PASSWORD
        value: ""
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_LOGIN_CHANNEL_ID
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEWEBPAY_MERCHANT_ID
        sync: false
      - key: NEWEBPAY_HASH_KEY
        sync: false
      - key: NEWEBPAY_HASH_IV
        sync: false
      - key: NEWEBPAY_STAGE
        value: sandbox
      # Never wipe Render Environment Variables — LINE token/secret/LIFF_ID
      # missing makes /callback return 503 and messaging die.
  - type: cron
    name: alive-checkin-contact-reminders
    env: python
    schedule: "0 1 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/contact-reminders
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-checkin-reminders
    env: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/checkin-reminders
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-overdue-alerts
    env: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/overdue-alerts
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-renewal-reminders
    env: python
    schedule: "0 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/renewal-reminders
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-membership-expiry
    env: python
    schedule: "15 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/membership-expiry
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-data-cleanup
    env: python
    schedule: "30 18 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/data-cleanup
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
