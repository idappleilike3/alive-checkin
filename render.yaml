services:
  - type: web
    name: alive-checkin
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LIFF_ID
        value: 2010674803-rK98c0lo
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: APP_TIMEZONE
        value: Asia/Taipei
      - key: DATA_FILE
        value: data/state.json
      - key: ADMIN_PASSWORD
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-contact-reminders
    env: python
    schedule: "0 1 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/contact-reminders
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-checkin-reminders
    env: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/checkin-reminders
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
  - type: cron
    name: alive-checkin-data-cleanup
    env: python
    schedule: "30 18 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_ping.py /api/cron/data-cleanup
    envVars:
      - key: APP_PUBLIC_URL
        value: https://alive-checkin.onrender.com/
      - key: CRON_SECRET
        sync: false
